apiVersion: v1
kind: Namespace
metadata:
  name: sampling-strategies-head
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-service
  namespace: sampling-strategies-head
  labels:
    app: movie-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: movie-service
  template:
    metadata:
      labels:
        app: movie-service
    spec:
      volumes:
        - name: otel-agent
          emptyDir: {}
        - name: otel-config
          configMap:
            name: otel-agent-config
            items:
              - key: opentelemetry-config.properties
                path: opentelemetry-config.properties
      initContainers:
        - name: download-otel-agent
          image: curlimages/curl:latest
          command: ["sh", "-c"]
          args:
            - >
              curl -L -o /otel/opentelemetry-javaagent.jar
              https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/latest/download/opentelemetry-javaagent.jar
          volumeMounts:
            - name: otel-agent
              mountPath: /otel
      containers:
        - name: movie-service
          image: vinsguru/movie-service
          ports:
            - containerPort: 8080
          env:
            - name: ACTOR_SERVICE_URL
              value: "http://actor-service:8080/api/actors/"
            - name: REVIEW_SERVICE_URL
              value: "http://review-service:8080/api/reviews"
          command: ["java"]
          args:
            - "-javaagent:/otel/opentelemetry-javaagent.jar"
            - "-Dotel.javaagent.configuration-file=/otel-config/opentelemetry-config.properties"
            - "-Dotel.service.name=movie-service"
            - "-jar"
            - "/app/app.jar"
          volumeMounts:
            - name: otel-agent
              mountPath: /otel
            - name: otel-config
              mountPath: /otel-config
---
apiVersion: v1
kind: Service
metadata:
  name: movie-service
  namespace: sampling-strategies-head
  labels:
    app: movie-service
spec:
  selector:
    app: movie-service
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
